<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дневник тренировок</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0f19">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/style.css">

</head>
<body>

    <div id="nav" class="nav-bottom"></div>

    <div id="app" class="app-container">
        <h1>Дневник тренировок</h1>
        <section id="section-home" class="app-section">
            <div class="search-filter-bar">
                <input type="text" id="input-search" class="form-control" placeholder="Поиск тренировок...">
                <select id="select-date-filter" class="form-control">
                    <option value="">Все время</option>
                    <option value="today">Сегодня</option>
                    <option value="week">За последнюю неделю</option>
                    <option value="month">За последний месяц</option>
                </select>
                <div class="muscle-filters">
                    <label class="muscle-label"><input type="checkbox" class="filter-muscle-checkbox"><span>Грудь</span></label>
                    <label class="muscle-label"><input type="checkbox" class="filter-muscle-checkbox"><span>Спина</span></label>
                    <label class="muscle-label"><input type="checkbox" class="filter-muscle-checkbox"><span>Ноги</span></label>
                    <label class="muscle-label"><input type="checkbox" class="filter-muscle-checkbox"><span>Плечи</span></label>
                    <label class="muscle-label"><input type="checkbox" class="filter-muscle-checkbox"><span>Руки</span></label>
                </div>
            </div>
            <ul id="list-workouts" style="list-style: none;"></ul>
        </section>

        <section id="section-stats" class="app-section">
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px;">
                <div class="workout-card" style="margin:0; text-align:center;">
                    <small style="color:var(--color-muted)">Всего тренировок</small>
                    <h2 id="stat-total">0</h2>
                </div>
                <div class="workout-card" style="margin:0; text-align:center;">
                    <small style="color:var(--color-muted)">Тоннаж (кг)</small>
                    <h2 id="stat-weight">0</h2>
                </div>
                <div class="workout-card" style="margin:0; text-align:center;">
                    <small style="color:var(--color-muted)">Всего подходов</small>
                    <h2 id="stat-sets">0</h2>
                </div>
                <div class="workout-card" style="margin:0; text-align:center;">
                    <small style="color:var(--color-muted)">Калории</small>
                    <h2 id="stat-calories">0</h2>
                </div>
                <div class="workout-card" style="margin:0; text-align:center;">
                    <small style="color:var(--color-muted)">Серия (дней)</small>
                    <h2 id="stat-streak">0</h2>
                </div>
                <div class="workout-card" style="margin:0; text-align:center;">
                    <small style="color:var(--color-muted)">Текущий вес</small>
                    <h2 id="stat-current-weight">Нет данных</h2>
                </div>
            </div>
            
            <div class="chart-container">
                <canvas id="chart-stats"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="chart-weight"></canvas>
            </div>
        </section>

        <section id="section-add" class="app-section">
            <div class="workout-card">
                <h2>Новая тренировка</h2>
                <form id="form-add-workout">
                    <div class="form-group">
                        <label>Название упражнения / тренировки</label>
                        <input type="text" name="title-add" class="form-control" required placeholder="Например: Жим лежа">
                    </div>
                    <div class="form-group">
                        <label>Выбрать из шаблонов</label>
                        <select id="exercise-select-add" class="form-control"></select>
                    </div>
                    <div class="form-group">
                        <label>Дата</label>
                        <input type="date" name="date-add" class="form-control">
                    </div>
                    <div class="form-group" style="display:flex; gap:10px;">
                        <div style="flex:1;">
                            <label>Начало</label>
                            <input type="time" name="start-add" class="form-control">
                        </div>
                        <div style="flex:1;">
                            <label>Конец</label>
                            <input type="time" name="end-add" class="form-control">
                        </div>
                    </div>
                    <div class="form-group" style="display:flex; gap:10px;">
                        <div style="flex:1;">
                            <label>Вес снаряда (кг)</label>
                            <input type="number" step="0.1" name="weight-add" class="form-control" placeholder="0">
                        </div>
                        <div style="flex:1;">
                            <label>Повторения</label>
                            <input type="number" name="reps-add" class="form-control" placeholder="0">
                        </div>
                        <div style="flex:1;">
                            <label>Отдых (сек)</label>
                            <input type="number" name="rest-add" class="form-control" value="60">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Расход калорий (ккал)</label>
                        <input type="number" name="calories-add" class="form-control" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label>Собственный вес тела (кг)</label>
                        <input type="number" step="0.1" name="body-weight-add" class="form-control" placeholder="0" value="65">
                    </div>
                    <div class="form-group">
                        <label>Заметки</label>
                        <textarea name="notes-add" class="form-control" rows="3" placeholder="Опишите самочувствие или особенности..."></textarea>
                    </div>
                    <button type="submit" class="btn-primary" style="width:100%; justify-content:center; margin-top:10px;">
                        <i class="fas fa-save"></i> Сохранить тренировку
                    </button>
                </form>
            </div>
        </section>
    </div>

    <div id="modal-edit" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 style="color:var(--color-yellow); margin-bottom:15px;">Изменить тренировку</h2>
            <form id="form-edit-workout">
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="edit-title" name="edit-title" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Выбрать упражнение</label>
                    <select id="exercise-select-edit" class="form-control"></select>
                </div>
                <div class="form-group">
                    <label>Дата</label>
                    <input type="date" id="edit-date" name="edit-date" class="form-control">
                </div>
                <div class="form-group" style="display:flex; gap:10px;">
                    <div style="flex:1;">
                        <label>Начало</label>
                        <input type="time" id="edit-start" name="edit-start" class="form-control">
                    </div>
                    <div style="flex:1;">
                        <label>Конец</label>
                        <input type="time" id="edit-end" name="edit-end" class="form-control">
                    </div>
                </div>
                <div class="form-group" style="display:flex; gap:10px;">
                    <div style="flex:1;">
                        <label>Вес (кг)</label>
                        <input type="number" step="0.1" id="edit-weight-add" name="edit-weight-add" class="form-control">
                    </div>
                    <div style="flex:1;">
                        <label>Повторы</label>
                        <input type="number" id="edit-reps-add" name="edit-reps-add" class="form-control">
                    </div>
                    <div style="flex:1;">
                        <label>Отдых (с)</label>
                        <input type="number" id="edit-rest-add" name="edit-rest-add" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label>Калории</label>
                    <input type="number" id="edit-calories" name="edit-calories" class="form-control">
                </div>
                <div class="form-group">
                    <label>Вес тела (кг)</label>
                    <input type="number" step="0.1" id="edit-body-weight" name="edit-body-weight" class="form-control">
                </div>
                <div class="form-group">
                    <label>Заметки</label>
                    <textarea id="edit-notes" name="edit-notes" class="form-control" rows="2"></textarea>
                </div>
                <button type="submit" class="btn-primary" style="width:100%; justify-content:center;">
                    <i class="fas fa-check"></i> Применить изменения
                </button>
            </form>
        </div>
    </div>

    <script src="js/workouts.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
